<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOH | 予約受付完了</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@300;400;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>

<body class="thanks-page">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="logo" href="/" th:href="@{/}" aria-label="KOH ホーム">
        <img class="logo__image" src="assets/images/common/koh-logo-new.png" alt="KOH">
      </a>
      <nav class="site-header__nav" aria-label="グローバルナビゲーション">
        <a class="nav-link" href="/faq" th:href="@{/faq}">FAQ（よくあるご質問）</a>
      </nav>
    </div>
  </header>

  <main class="thanks-main">
    <section class="thanks-section container">
      <h1 class="thanks-title">予約受付が完了しました</h1>
      <p class="thanks-lead">予約フォームの送信を受け付けました。内容確認のうえ、担当よりご連絡いたします。</p>
      <div class="thanks-actions">
        <a class="btn btn--primary" href="/" th:href="@{/}">トップページへ戻る</a>
        <a class="thanks-sub-link" href="/reserve" th:href="@{/reserve}">別の内容で予約する（予約フォームへ）</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <a class="logo" href="/" th:href="@{/}" aria-label="KOH ホーム">
        <img class="logo__image" src="assets/images/common/koh-logo-new.png" alt="KOH">
      </a>
      <nav class="site-footer__nav" aria-label="フッターナビゲーション">
        <a class="nav-link" href="/faq" th:href="@{/faq}">FAQ（よくあるご質問）</a>
      </nav>
      <small class="site-footer__copyright">©KOH</small>
    </div>
  </footer>
</body>

</html>
